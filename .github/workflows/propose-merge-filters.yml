name: 'Propose Merge Filters'
on: workflow_dispatch
jobs:
  technologies:
    permissions:
      models: read
    runs-on: ubuntu-latest
    steps:
      - name: Make code changes
        id: inference
        uses: actions/ai-inference@v1
        with:
          prompt: |
            Read `skill_prompt` input and propose merge filters for technologies.
          file_input: |
            skill_prompt: ./.agent/skills/propose-merge-filters/SKILL.md
      - name: Print Output
        id: output
        run: echo "${{ steps.inference.outputs.response }}"
